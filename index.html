<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
         <!-- tailwind and daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- icon add -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome add -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <!-- font owesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center">

    <div class="card w-full max-w-md bg-base-100 shadow-xl">

        <div class="card-body">

            <div class="flex justify-center">
                <div class="w-20 h-20 rounded-full flex items-center justify-center">
                  
                    <img src="assets/github-logo.png" alt="">
                </div>
            </div>

            <div class="text-center mt-3">
                <h2 class="text-[30px] font-bold">GitHub Issues Tracker</h2>
                <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <div class="mt-5">
                <label class="font-medium text-[#1F2937]">Username</label>
                <input id="input-Text" type="text" placeholder="Enter Username"
                    class="input input-bordered w-full mt-1 outline-0 border-gray-400" />
                <p class="text-[13px] text-purple-600 mt-1">Default: admin</p>
            </div>

            <div class="mt-3">
                <label class="font-medium text-[#1F2937]">Password</label>
                <input id="input-pin" type="password" placeholder="Enter Password"
                    class="input input-bordered w-full mt-1 outline-0 border-gray-400" />
                <p class="text-[13px] text-purple-600 mt-1">Default: admin123</p>

            </div>

            <button id="login-btn" class="btn w-full mt-5 text-white border-0 bg-[#4f46e5]">
                Sign In </button>
                
            <div class="divider font-bold">OR</div>
            <div class="text-center">
                <p>Demo Credentials:</p>
            </div>
            <div class="bg-base-200 p-4 rounded text-center text-sm">
                <p class="text-[#1F2937] font-medium"><b>Username:</b> admin</p>
                <p class="text-[#1F2937] font-medium"><b>Password:</b> admin123</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
